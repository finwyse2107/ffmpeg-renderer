version: "3.9"

services:
  ffmpeg-renderer:
    build: .
    container_name: ffmpeg-renderer
    restart: unless-stopped
    environment:
      SHARED_SECRET: ${SHARED_SECRET}
      MAX_RENDER_MS: 1800000
    # No `ports:` — internal-only.
    # n8n reaches this container as http://ffmpeg-renderer:3000
    networks:
      - n8n-network

networks:
  n8n-network:
    external: true
    name: n8n-n8nrunnerpostgresollama-exwyyz
